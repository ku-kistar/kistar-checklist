<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점검 중 | KI-STAR 융합전공 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(170deg,#0c2040 0%,#0b1f3a 40%,#07131f 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:#fff;padding:2rem;
}
.card{
  text-align:center;max-width:420px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:3rem 2rem;
}
.icon{font-size:48px;margin-bottom:1.2rem}
.badge{
  display:inline-block;font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  background:rgba(200,57,43,.25);border:1px solid rgba(200,57,43,.5);
  color:#f08070;padding:4px 12px;border-radius:99px;margin-bottom:1.2rem;
}
h1{font-size:22px;font-weight:900;margin-bottom:.6rem;line-height:1.3}
p{font-size:13px;color:rgba(255,255,255,.5);line-height:1.8;margin-bottom:.4rem}
.footer{margin-top:2rem;font-size:11px;color:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <div class="badge">업데이트 중</div>
  <h1>잠시 점검 중입니다</h1>
  <p>더 나은 서비스 제공을 위해<br>시스템을 업데이트하고 있습니다.</p>
  <p>곧 다시 이용하실 수 있습니다.</p>
  <div class="footer">KI-STAR · 차세대AI반도체특성화대학사업단</div>
</div>
</body>
</html>
